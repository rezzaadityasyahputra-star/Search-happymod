<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HappyMod Search Engine</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 28, 47, 0.7);
            --primary-color: #22c55e; /* Hijau HappyMod */
            --primary-glow: rgba(34, 197, 94, 0.4);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: radial-gradient(circle at top, #16222f 0%, #0b0f19 70%);
        }

        /* Container Utama */
        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animasi Logo Bergerak (Floating/Layout) */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            animation: float 4s ease-in-out infinite;
        }

        .logo-container svg, .logo-container img {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }

        .logo-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        /* Search Bar Wrapper & Animation */
        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 6px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            margin-bottom: 50px;
        }

        .search-box:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 25px var(--primary-glow);
            transform: scale(1.02);
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 12px 25px;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* Animasi Tombol Cari */
        .search-btn {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.6);
            background: #2ee670;
        }

        .search-btn:active {
            transform: translateY(1px);
        }

        /* Loading Spinner */
        .loader {
            display: none;
            margin: 20px 0;
        }
        .loader i {
            font-size: 2.5rem;
            color: var(--primary-color);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Grid Hasil Pencarian */
        .results-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .results-grid.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Efek Kartu / Item Hasil */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(34, 197, 94, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(34, 197, 94, 0.1);
        }

        .card-icon {
            width: 85px;
            height: 85px;
            border-radius: 18px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.1) rotate(3deg);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 3.3rem;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tag.mod-info {
            background: rgba(34, 197, 94, 0.1);
            color: var(--primary-color);
            border: 1px solid rgba(34, 197, 94, 0.2);
            font-weight: 500;
        }

        /* Animasi Tombol Download */
        .download-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover .download-btn {
            background: linear-gradient(135deg, var(--primary-color), #16a34a);
            color: #000;
            border-color: transparent;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        /* Status Error / Kosong */
        .status-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Section di Tengah Atas -->
        <div class="logo-container">
            <!-- Custom HappyMod Devil Logo (SVG Ber-glowing) -->
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="53" r="35" fill="#22c55e"/>
                <!-- Mata -->
                <circle cx="38" cy="48" r="5" fill="#000"/>
                <circle cx="62" cy="48" r="5" fill="#000"/>
                <!-- Senyum -->
                <path d="M 35 62 Q 50 75 65 62" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
                <!-- Tanduk Kiri -->
                <path d="M 25 32 Q 12 20 22 8 Q 28 18 29 26" fill="#22c55e" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>
                <!-- Tanduk Kanan -->
                <path d="M 75 32 Q 88 20 78 8 Q 72 18 71 26" fill="#22c55e" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <h1 class="logo-title">HappyMod</h1>
        </div>

        <!-- Form Pencarian -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search mods, games, apps..." autocomplete="off">
            <button class="search-btn" id="search-button">
                <i class="fa-solid fa-magnifying-glass"></i> Cari
            </button>
        </div>

        <!-- Loader Spinner -->
        <div class="loader" id="loader">
            <i class="fa-solid fa-circle-notch"></i>
        </div>

        <!-- Wadah Grid Hasil -->
        <div class="results-grid" id="results-grid"></div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const resultsGrid = document.getElementById('results-grid');
        const loader = document.getElementById('loader');

        // Event listener saat tombol cari diklik
        searchButton.addEventListener('click', performSearch);

        // Event listener saat menekan tombol "Enter" di keyboard
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            // Tampilkan animasi loader & sembunyikan grid lama
            loader.style.display = 'block';
            resultsGrid.classList.remove('show');
            resultsGrid.innerHTML = '';

            try {
                // Melakukan hit API pencarian
                const response = await fetch(`https://api.lexcode.biz.id/api/search/happymod?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                loader.style.display = 'none';

                if (data.success && data.results.length > 0) {
                    displayResults(data.results);
                } else {
                    resultsGrid.innerHTML = `<p class="status-msg">Tidak ada hasil ditemukan untuk "${query}"</p>`;
                    resultsGrid.classList.add('show');
                }
            } catch (error) {
                console.error(error);
                loader.style.display = 'none';
                resultsGrid.innerHTML = `<p class="status-msg" style="color: #ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Terjadi kesalahan koneksi.</p>`;
                resultsGrid.classList.add('show');
            }
        }

        function displayResults(results) {
            resultsGrid.innerHTML = '';

            results.forEach((item, index) => {
                // Membuat struktur elemen card
                const card = document.createElement('div');
                card.classList.add('card');
                
                // Membuat animasi staggered (muncul berurutan satu per satu)
                card.style.animationDelay = `${index * 0.1}s`;

                // Memisahkan metadata info (misal: Size, Fitur Mod)
                let tagsHTML = '';
                if(item.info && item.info.length > 0) {
                    item.info.forEach((infoText, i) => {
                        // Info indeks ke-1 biasanya berisi info mod hack (seperti Unlimited Money)
                        const isModFeature = i === 1 || infoText.toLowerCase().includes('mod') || infoText.toLowerCase().includes('money');
                        tagsHTML += `<span class="tag ${isModFeature ? 'mod-info' : ''}">${infoText}</span>`;
                    });
                }

                card.innerHTML = `
                    <img src="${item.icon}" alt="${item.title}" class="card-icon" onerror="this.src='https://placehold.co/100x100/141c2f/22c55e?text=No+Icon'">
                    <h3 class="card-title">${item.title}</h3>
                    <div class="card-tags">
                        ${tagsHTML}
                    </div>
                    <a href="${item.url}" target="_blank" class="download-btn">
                        <i class="fa-solid fa-download"></i> Download Mod
                    </a>
                `;

                resultsGrid.appendChild(card);
            });

            // Picu transisi animasi fade-in grid
            setTimeout(() => {
                resultsGrid.classList.add('show');
            }, 50);
        }
    </script>
</body>
</html>
